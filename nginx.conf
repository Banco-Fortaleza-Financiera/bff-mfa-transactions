server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  types {
    text/html html htm;
    text/css css;
    application/javascript js mjs;
    application/json json;
    image/x-icon ico;
    image/png png;
    image/jpeg jpg jpeg;
    image/svg+xml svg;
    image/webp webp;
    font/woff woff;
    font/woff2 woff2;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /remoteEntry.js {
    try_files $uri =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Access-Control-Allow-Origin "*";
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ~* \.(?:js|mjs|css|ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
